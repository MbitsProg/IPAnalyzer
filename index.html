<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PA Firewall · IP Analyzer (Working)</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #080d14;
      color: #b8cce0;
      font-family: 'IBM Plex Mono', monospace;
      padding: 28px 24px;
    }
    .app {
      max-width: 1600px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
      border-bottom: 1px solid #1c2e46;
      padding-bottom: 20px;
    }
    .logo {
      width: 48px;
      height: 48px;
      background: conic-gradient(from 135deg, #00e5ff, #00e676, #00e5ff);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: #080d14;
      font-family: 'Barlow', sans-serif;
    }
    .header h1 {
      font-family: 'Barlow', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
    }
    .header h1 em {
      color: #00e5ff;
      font-style: normal;
    }
    .upload-panel {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .upload-card {
      flex: 1;
      background: #0e1520;
      border: 1px solid #1c2e46;
      border-radius: 16px;
      padding: 20px;
    }
    .file-dropzone {
      border: 2px dashed #243a56;
      border-radius: 12px;
      background: #121d2e;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .file-status {
      font-size: 0.75rem;
      margin-top: 10px;
    }
    .file-status.success { color: #00e676; }
    .file-status.error { color: #ff5252; }
    .btn {
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-primary {
      background: #00e5ff;
      color: #080d14;
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #243a56;
      color: #b8cce0;
    }
    .progress-wrap {
      height: 3px;
      background: #1c2e46;
      border-radius: 2px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #00e676);
      width: 0%;
      transition: width 0.25s;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #0e1520;
      border: 1px solid #1c2e46;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .stat-card .number {
      font-family: 'Barlow', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: white;
    }
    .badge {
      display: inline-block;
      font-size: 0.62rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-hardcoded { background: rgba(0, 230, 118, 0.15); color: #00e676; }
    .badge-psg { background: rgba(0, 229, 255, 0.15); color: #00e5ff; }
    .table-wrapper {
      overflow-x: auto;
      background: #0e1520;
      border: 1px solid #1c2e46;
      border-radius: 12px;
      margin-bottom: 28px;
      max-height: 500px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }
    th {
      background: #121d2e;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      position: sticky;
      top: 0;
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid #1c2e46;
    }
    .pagination {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 16px 0;
    }
    .error-box {
      background: rgba(255, 82, 82, 0.1);
      border-left: 3px solid #ff5252;
      padding: 12px;
      margin: 12px 0;
      font-size: 0.75rem;
      color: #ffab40;
    }
    .hidden { display: none; }
  </style>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">⛨</div>
    <div><h1>PA Firewall · <em>IP Analyzer</em> <span style="font-size:0.7rem;">✔️ Guaranteed dashboard</span></h1></div>
  </div>

  <div class="upload-panel">
    <div class="upload-card">
      <h3>📁 1. PA Traffic Log</h3>
      <div id="paDropzone" class="file-dropzone">📂 Drop or click to upload<input type="file" id="paFileInput" accept=".xlsx,.xls,.csv" style="display:none;"></div>
      <div id="paStatus" class="file-status">No file loaded</div>
    </div>
    <div class="upload-card">
      <h3>🗺️ 2. PSG Subnets</h3>
      <div id="psgDropzone" class="file-dropzone">📂 Drop or click to upload<input type="file" id="psgFileInput" accept=".xlsx,.xls" style="display:none;"></div>
      <div id="psgStatus" class="file-status">No file loaded</div>
    </div>
  </div>

  <div class="action-bar">
    <button id="analyzeBtn" class="btn btn-primary" disabled>▶ Run Analysis</button>
    <button id="clearBtn" class="btn btn-secondary">✖ Clear</button>
  </div>
  <div id="progressWrap" class="progress-wrap hidden"><div id="progressBar" class="progress-bar"></div></div>
  <div id="errorBox" class="error-box hidden"></div>

  <div id="resultsContainer" class="hidden">
    <div class="stats-grid" id="statsPanel"></div>
    <div class="table-wrapper"><table id="dataTable"><thead id="tableHeader"></thead><tbody id="tableBody"></tbody></table></div>
    <div id="paginationControls" class="pagination"></div>
    <div><button id="exportCsvBtn" class="btn btn-secondary">📎 Export CSV</button></div>
  </div>
</div>

<script>
  // Hardcoded subnets
  const HARDCODED_SUBNETS = ["10.109.187.0/27","10.109.34.0/24","10.109.66.0/24","10.109.65.0/24","10.109.77.64/29","10.118.44.0/25","10.109.186.0/24"];

  let paData = null;          // { rows, srcCol, dstCol, headers }
  let psgSubnets = [];        // { networkInt, maskInt, sheetName }
  let taggedRows = [];
  let currentPage = 1, rowsPerPage = 500;
  let currentSort = { col: null, asc: true };

  // ---------- IP helpers ----------
  const ipCache = new Map();
  function ipToInt(ip) {
    if (!ip || typeof ip !== 'string') return null;
    if (ipCache.has(ip)) return ipCache.get(ip);
    const parts = ip.trim().split('.');
    if (parts.length !== 4) { ipCache.set(ip, null); return null; }
    let n = 0;
    for (let i=0; i<4; i++) {
      const v = parseInt(parts[i],10);
      if (isNaN(v) || v<0 || v>255) { ipCache.set(ip, null); return null; }
      n = (n<<8) | v;
    }
    const res = n>>>0;
    ipCache.set(ip, res);
    return res;
  }
  const intToIp = (n) => `${(n>>>24)&255}.${(n>>>16)&255}.${(n>>>8)&255}.${n&255}`;

  function parseCidr(cidr) {
    const [ipStr, bits] = cidr.split('/');
    if (!bits) return null;
    const prefix = parseInt(bits,10);
    if (isNaN(prefix) || prefix<0 || prefix>32) return null;
    const mask = (prefix===0) ? 0 : (0xFFFFFFFF << (32-prefix)) >>> 0;
    const network = (ipToInt(ipStr) & mask) >>> 0;
    if (network === undefined) return null;
    return { network, mask, prefix };
  }

  const hardcodedParsed = HARDCODED_SUBNETS.map(c => parseCidr(c)).filter(c => c);

  function getTags(ipInt) {
    if (ipInt === null) return "";
    const tags = [];
    for (let h of hardcodedParsed) {
      if ((ipInt & h.mask) >>> 0 === h.network) { tags.push("Hardcoded_Subnet"); break; }
    }
    for (let p of psgSubnets) {
      if ((ipInt & p.maskInt) >>> 0 === p.networkInt) tags.push(`PSG_${p.sheetName}`);
    }
    return tags.join(", ");
  }

  // ---------- File Parsing (robust) ----------
  async function loadPaLog(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
        if (!rows.length) reject("Empty file");
        const headers = Object.keys(rows[0]);
        const srcCol = headers.find(h => h.toLowerCase() === "source address");
        const dstCol = headers.find(h => h.toLowerCase() === "destination address");
        if (!srcCol || !dstCol) reject(`Missing columns. Found: ${headers.join(", ")}`);
        resolve({ rows, srcCol, dstCol, headers });
      };
      reader.onerror = () => reject("File read error");
      reader.readAsArrayBuffer(file);
    });
  }

  async function loadPsgSubnets(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const subnets = [];
        for (let sheetName of workbook.SheetNames) {
          const sheet = workbook.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
          if (!rows) continue;
          for (let i=0; i<rows.length; i++) {
            const cidrRaw = rows[i][2] ? String(rows[i][2]).trim() : ""; // Column C = index 2
            if (!cidrRaw) continue;
            const parsed = parseCidr(cidrRaw);
            if (parsed) {
              subnets.push({
                networkInt: parsed.network,
                maskInt: parsed.mask,
                sheetName: sheetName
              });
            }
          }
        }
        resolve(subnets);
      };
      reader.onerror = () => reject("File read error");
      reader.readAsArrayBuffer(file);
    });
  }

  // ---------- Analysis ----------
  async function runAnalysis() {
    if (!paData) { showError("Load PA Traffic Log first."); return; }
    if (!psgSubnets.length) { showError("Load PSG Subnets file first."); return; }

    setProgress(10);
    document.getElementById("resultsContainer").classList.add("hidden");
    const { rows, srcCol, dstCol } = paData;
    const total = rows.length;
    const newTagged = [];
    const unmatchedInts = new Set();

    for (let i=0; i<total; i++) {
      const row = rows[i];
      const srcRaw = row[srcCol] ? String(row[srcCol]).trim() : "";
      const dstRaw = row[dstCol] ? String(row[dstCol]).trim() : "";
      let srcTag = "", dstTag = "";
      let srcInt = null, dstInt = null;
      if (srcRaw) {
        srcInt = ipToInt(srcRaw);
        if (srcInt !== null) {
          srcTag = getTags(srcInt);
          if (!srcTag) unmatchedInts.add(srcInt);
        }
      }
      if (dstRaw) {
        dstInt = ipToInt(dstRaw);
        if (dstInt !== null) {
          dstTag = getTags(dstInt);
          if (!dstTag) unmatchedInts.add(dstInt);
        }
      }
      const enriched = { ...row, Source_Tag: srcTag, Destination_Tag: dstTag };
      newTagged.push(enriched);
      if (i % 5000 === 0) {
        setProgress(10 + Math.floor((i/total)*70));
        await new Promise(r => setTimeout(r, 0));
      }
    }
    setProgress(85);
    taggedRows = newTagged;
    // Summarize unmatched IPs
    const unmatchedArray = Array.from(unmatchedInts);
    const summary = summarizeCidrs(unmatchedArray);
    window.summaryResult = summary;
    setProgress(95);
    renderDashboard();
    setProgress(100);
    setTimeout(() => setProgress(null), 500);
  }

  // Simple CIDR summarization for unmatched IPs
  function summarizeCidrs(ipInts) {
    if (!ipInts.length) return { blocks: [], singles: [] };
    const sorted = [...new Set(ipInts)].sort((a,b)=>a-b);
    const blocks = [];
    const singles = [];
    let i = 0;
    while (i < sorted.length) {
      let best = null;
      for (let p=30; p>=24; p--) {
        const step = 1 << (32-p);
        const base = sorted[i] & (0xFFFFFFFF << (32-p));
        const end = base + step - 1;
        let count = 0;
        for (let j=i; j<sorted.length && sorted[j]<=end; j++) count++;
        if (count >= 2 && (!best || count > best.count)) best = { prefix: p, base, count, endIdx: i+count-1 };
      }
      if (best && best.count >= 2) {
        blocks.push({ cidr: `${intToIp(best.base)}/${best.prefix}`, count: best.count });
        i = best.endIdx + 1;
      } else {
        singles.push(intToIp(sorted[i]));
        i++;
      }
    }
    return { blocks, singles };
  }

  // ---------- Dashboard Rendering (with pagination) ----------
  function renderDashboard() {
    if (!taggedRows.length) return;
    document.getElementById("resultsContainer").classList.remove("hidden");
    const headers = paData.headers;
    const displayHeaders = [...headers, "Source_Tag", "Destination_Tag"];
    
    let sorted = [...taggedRows];
    if (currentSort.col) {
      sorted.sort((a,b) => {
        let av = a[currentSort.col] ?? "";
        let bv = b[currentSort.col] ?? "";
        if (typeof av === "number" && typeof bv === "number") return currentSort.asc ? av-bv : bv-av;
        av = String(av).toLowerCase();
        bv = String(bv).toLowerCase();
        if (av < bv) return currentSort.asc ? -1 : 1;
        if (av > bv) return currentSort.asc ? 1 : -1;
        return 0;
      });
    }
    const total = sorted.length;
    const pages = Math.ceil(total / rowsPerPage);
    if (currentPage > pages) currentPage = pages || 1;
    const start = (currentPage-1)*rowsPerPage;
    const pageRows = sorted.slice(start, start+rowsPerPage);
    
    // Stats
    let rowsWithTags = taggedRows.filter(r => r.Source_Tag || r.Destination_Tag).length;
    document.getElementById("statsPanel").innerHTML = `
      <div class="stat-card"><div class="number">${total.toLocaleString()}</div><div class="label">Total Rows</div></div>
      <div class="stat-card"><div class="number">${rowsWithTags.toLocaleString()}</div><div class="label">Tagged Rows</div></div>
      <div class="stat-card"><div class="number">${window.summaryResult?.blocks.length || 0}</div><div class="label">Summarized Blocks</div></div>
      <div class="stat-card"><div class="number">${window.summaryResult?.singles.length || 0}</div><div class="label">Unmatched Singles</div></div>
    `;
    
    // Table header
    document.getElementById("tableHeader").innerHTML = `<tr>${displayHeaders.map(h => `<th onclick="sortTable('${h.replace(/'/g,"\\'")}')">${h} ${currentSort.col===h ? (currentSort.asc?'↑':'↓') : ''}</th>`).join('')}</tr>`;
    
    // Table body
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    for (let row of pageRows) {
      const tr = document.createElement("tr");
      for (let h of displayHeaders) {
        const td = document.createElement("td");
        let val = row[h] !== undefined ? row[h] : "";
        if (h === "Source_Tag" || h === "Destination_Tag") {
          if (!val) val = "—";
          else if (val.includes("Hardcoded")) td.innerHTML = `<span class="badge badge-hardcoded">${val}</span>`;
          else td.innerHTML = `<span class="badge badge-psg">${val}</span>`;
        } else td.textContent = val;
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    
    // Pagination
    document.getElementById("paginationControls").innerHTML = `
      <button ${currentPage===1?'disabled':''} onclick="changePage(1)">⏮ First</button>
      <button ${currentPage===1?'disabled':''} onclick="changePage(${currentPage-1})">◀ Prev</button>
      <span>Page ${currentPage} of ${pages||1}</span>
      <button ${currentPage===pages||pages===0?'disabled':''} onclick="changePage(${currentPage+1})">Next ▶</button>
      <button ${currentPage===pages||pages===0?'disabled':''} onclick="changePage(${pages})">Last ⏭</button>
      <select id="rowsPerPageSelect" onchange="changeRowsPerPage(this.value)">
        <option ${rowsPerPage===200?'selected':''} value="200">200</option>
        <option ${rowsPerPage===500?'selected':''} value="500">500</option>
        <option ${rowsPerPage===1000?'selected':''} value="1000">1000</option>
      </select> rows
    `;
  }

  window.changePage = (page) => { currentPage = page; renderDashboard(); };
  window.changeRowsPerPage = (val) => { rowsPerPage = parseInt(val,10); currentPage = 1; renderDashboard(); };
  window.sortTable = (col) => {
    if (currentSort.col === col) currentSort.asc = !currentSort.asc;
    else { currentSort.col = col; currentSort.asc = true; }
    currentPage = 1;
    renderDashboard();
  };

  function exportCSV() {
    if (!taggedRows.length) return;
    const headers = [...paData.headers, "Source_Tag", "Destination_Tag"];
    const rows = [headers.map(h => `"${h.replace(/"/g,'""')}"`).join(",")];
    for (let row of taggedRows) {
      rows.push(headers.map(h => {
        let val = row[h] !== undefined ? row[h] : "";
        val = String(val).replace(/"/g,'""');
        return `"${val}"`;
      }).join(","));
    }
    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "pa_analyzer_export.csv";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // UI helpers
  function setProgress(pct) {
    const wrap = document.getElementById("progressWrap");
    const bar = document.getElementById("progressBar");
    if (pct === null) { wrap.classList.add("hidden"); return; }
    wrap.classList.remove("hidden");
    bar.style.width = pct + "%";
  }
  function showError(msg) {
    const err = document.getElementById("errorBox");
    if (!msg) { err.classList.add("hidden"); return; }
    err.classList.remove("hidden");
    err.innerText = msg;
  }

  // File handlers
  function setupDropzone(dropId, inputId, statusId, isPa) {
    const drop = document.getElementById(dropId);
    const input = document.getElementById(inputId);
    const status = document.getElementById(statusId);
    drop.addEventListener("click", () => input.click());
    drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("drag"); });
    drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
    drop.addEventListener("drop", async e => {
      e.preventDefault();
      drop.classList.remove("drag");
      const file = e.dataTransfer.files[0];
      if (file) await handleFile(file, isPa, status);
    });
    input.addEventListener("change", async () => {
      if (input.files.length) await handleFile(input.files[0], isPa, status);
      input.value = "";
    });
  }
  async function handleFile(file, isPa, statusEl) {
    statusEl.innerHTML = `📄 ${file.name} (loading...)`;
    statusEl.classList.remove("success","error");
    try {
      if (isPa) {
        paData = await loadPaLog(file);
        statusEl.innerHTML = `✅ ${file.name} · ${paData.rows.length} rows, columns: ${paData.headers.slice(0,3).join(", ")}...`;
        statusEl.classList.add("success");
      } else {
        psgSubnets = await loadPsgSubnets(file);
        statusEl.innerHTML = `✅ ${file.name} · ${psgSubnets.length} CIDRs loaded from ${[...new Set(psgSubnets.map(s=>s.sheetName))].join(", ")}`;
        statusEl.classList.add("success");
      }
    } catch(err) {
      statusEl.innerHTML = `❌ ${err.message || err}`;
      statusEl.classList.add("error");
      console.error(err);
    } finally {
      document.getElementById("analyzeBtn").disabled = !(paData && psgSubnets.length);
    }
  }
  function clearAll() {
    paData = null;
    psgSubnets = [];
    taggedRows = [];
    document.getElementById("paStatus").innerHTML = "No file loaded";
    document.getElementById("psgStatus").innerHTML = "No file loaded";
    document.getElementById("resultsContainer").classList.add("hidden");
    document.getElementById("analyzeBtn").disabled = true;
    showError(null);
    setProgress(null);
  }

  // Event binding
  setupDropzone("paDropzone","paFileInput","paStatus",true);
  setupDropzone("psgDropzone","psgFileInput","psgStatus",false);
  document.getElementById("analyzeBtn").addEventListener("click", runAnalysis);
  document.getElementById("clearBtn").addEventListener("click", clearAll);
  document.getElementById("exportCsvBtn").addEventListener("click", exportCSV);
</script>
</body>
</html>
